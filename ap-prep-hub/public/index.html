    <!-- Puter.js for free Gemini API access -->
    <!-- Loaded async so a blocked network (e.g. Lightspeed Filter) doesn't stall page render -->
    <script>
      window.__puterBlocked = false;
      window.__puterLoaded = false;
      (function() {
        function markBlocked(reason) {
          if (window.__puterBlocked) return; // already flagged
          window.__puterBlocked = true;
          console.warn('[Puter] ' + reason + '. Using Google API fallback.');
        }

        // --- Strategy 1: Load the SDK script asynchronously ---
        var s = document.createElement('script');
        s.src = 'https://js.puter.com/v2/';
        s.async = true;
        s.onerror = function() {
          markBlocked('SDK script failed to load (network error / blocked)');
        };
        s.onload = function() {
          // onload fires even if Lightspeed returned a block page or
          // about:blank — the browser treats it as "fetched" even though
          // the content is garbage HTML, not JavaScript.
          try {
            var p = window.puter;
            if (!p || typeof p !== 'object' || !p.ai || typeof p.ai.chat !== 'function') {
              markBlocked('SDK script loaded but window.puter is missing or incomplete (blocked / redirected to about:blank)');
              return;
            }
            // SDK loaded successfully
            window.__puterLoaded = true;

            // Restore persisted auth token
            var t = localStorage.getItem('puter.auth.token');
            if (t && t.length > 10) {
              if (typeof p.setAuthToken === 'function') { p.setAuthToken(t); }
              else { p.authToken = t; }
            }
            // Suppress the SDK's built-in auth popup
            if (p.ui && typeof p.ui.authenticateWithPuter === 'function') {
              p.ui._originalAuthenticateWithPuter = p.ui.authenticateWithPuter;
              p.ui.authenticateWithPuter = function() {
                return Promise.reject(new Error('Auth suppressed by Apex Scholar'));
              };
            }
          } catch(e) {
            markBlocked('SDK onload handler threw: ' + e);
          }
        };
        document.head.appendChild(s);

        // --- Strategy 2: Fast parallel fetch probe ---
        // Lightspeed may redirect script loads to about:blank without firing
        // onerror. A fetch() to the same URL lets us detect blocks quickly
        // because fetch follows redirects and we can inspect the response.
        try {
          fetch('https://js.puter.com/v2/', { mode: 'no-cors', cache: 'no-store' })
            .then(function() {
              // mode:'no-cors' returns an opaque response (status 0, type 'opaque')
              // — this is normal for a successful cross-origin fetch.
              // If we get here, the network request at least completed.
              // The onload handler above still validates window.puter.
            })
            .catch(function() {
              // fetch itself failed — DNS block, connection refused, or
              // Lightspeed intercepted and returned something unfetchable.
              markBlocked('Fetch probe to js.puter.com failed (network blocked)');
            });
        } catch(e) { /* fetch not available — old browser, rely on other checks */ }

        // --- Strategy 3: Tiered timeouts ---
        // These only mark as blocked if __puterLoaded is STILL false AND
        // window.puter doesn't exist. If the SDK is still loading on a slow
        // connection but eventually arrives, __puterLoaded will be set by
        // the onload handler and getPuter() will pick it up live.
        // We DON'T use markBlocked() at 2s because slow internet exists.
        setTimeout(function() {
          if (!window.__puterLoaded && !window.puter) {
            console.warn('[Puter] SDK not loaded after 3s — may be blocked or slow connection.');
          }
        }, 3000);
        // At 10s, if still nothing, it's almost certainly blocked.
        setTimeout(function() {
          if (!window.__puterLoaded && !window.puter) {
            markBlocked('SDK not loaded after 10s');
          }
        }, 10000);
      })();
    </script>
    <title>Apex Scholar</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
